services:
  jupyter:
    image: nvcr.io/nvidia/pytorch:25.04-py3
    container_name: jupyter
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:?set JUPYTER_TOKEN in .env}
    volumes:
      - ./work:/workspace
    shm_size: "16gb"
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --ServerApp.root_dir=/workspace
